[build]
  publish = "public"

# Clean URLs - strip .html extensions
[[redirects]]
  from = "/mass-transit"
  to = "/mass-transit.html"
  status = 200

[[redirects]]
  from = "/manufacturing"
  to = "/manufacturing.html"
  status = 200

[[redirects]]
  from = "/wholesale-trade"
  to = "/wholesale-trade.html"
  status = 200

[[redirects]]
  from = "/structural"
  to = "/structural.html"
  status = 200

[[redirects]]
  from = "/marine"
  to = "/marine.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/sectors"
  to = "/sectors.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/paintshield"
  to = "/paintshield.html"
  status = 200

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
